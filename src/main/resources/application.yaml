spring:
  application:
    name: hotel-search-challenge

  datasource:
    url: jdbc:oracle:thin:@${ORACLE_HOST:localhost}:1521/FREEPDB1
    username: ${ORACLE_APP_USER}
    password: ${ORACLE_APP_USER_PWD}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: hotel-search-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.leonardo.hotel_search_challenge.domain.event"
        spring.json.value.default.type: "com.leonardo.hotel_search_challenge.domain.event.HotelSearchedEvent"

  threads:
    virtual:
      enabled: true

server:
  port: 8080